name: Update daily watchlist

on:
  push:
    branches: [main]
    paths:
      - 'fetch_prices.py'
      - 'tickers.json'
      - 'requirements.txt'
      - '.github/workflows/update.yml'

  # スクリプト自体が「ザラ場中はスキップ」判定を持つので、
  # cron はシンプルに各市場の引け後を確実にカバーするだけで OK
  schedule:
    # JP/KR 市場引け後 (15:30 JST = 06:30 UTC) → 07:00-08:00 UTC に2回
    - cron: "0,30 7 * * 1-5"

    # TW 市場引け後 (13:30 TWT = 05:30 UTC) → 06:00-07:00 UTC に2回
    - cron: "0,30 6 * * 1-5"

    # CN/HK 市場引け後 (15:00 CST/16:00 HKT = 07:00/08:00 UTC) → 08:30-09:30 UTC
    - cron: "30 8 * * 1-5"
    - cron: "30 9 * * 1-5"

    # 米国市場引け後 (16:00 ET = 20:00 UTC EDT / 21:00 UTC EST) → 両方カバー
    - cron: "30 20 * * 1-5"   # EDT夏時間引け+30分
    - cron: "30 21 * * 1-5"   # EST冬時間引け+30分

    # 日本朝 (前日の海外市場確定値を確実に表示) → 7:30 JST = 22:30 UTC
    - cron: "30 22 * * 0-4"

  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-watchlist
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices and generate HTML
        run: python fetch_prices.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git add index.html
            git commit -m "chore: update watchlist $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit."
          fi
